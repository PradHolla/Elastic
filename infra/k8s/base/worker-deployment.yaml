apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastic-worker
  template:
    metadata:
      labels:
        app: elastic-worker
    spec:
      serviceAccountName: elastic-worker
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: elastic-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "apps.worker.app.main"]
          args: ["--loop", "--wait-time-seconds", "5"]
          envFrom:
            - configMapRef:
                name: elastic-runtime-config
          env:
            # Pod name doubles as the lease owner id, so DynamoDB job records
            # show exactly which pod holds each attempt.
            - name: ELASTIC_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: metrics
              containerPort: 9100
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
