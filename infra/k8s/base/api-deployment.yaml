apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastic-api
  template:
    metadata:
      labels:
        app: elastic-api
    spec:
      serviceAccountName: elastic-api
      containers:
        - name: api
          image: elastic-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: elastic-runtime-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
