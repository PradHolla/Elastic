apiVersion: apps/v1
kind: Deployment
metadata:
  name: elastic-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elastic-web
  template:
    metadata:
      labels:
        app: elastic-web
    spec:
      containers:
        - name: web
          image: elastic-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
