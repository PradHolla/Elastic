apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: elastic-worker-aws-auth
spec:
  podIdentity:
    provider: aws
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: elastic-worker-sqs
spec:
  scaleTargetRef:
    name: elastic-worker
  minReplicaCount: 0
  maxReplicaCount: 5
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: elastic-worker-aws-auth
      metadata:
        queueURL: https://sqs.us-east-1.amazonaws.com/111111111111/elastic-dev-ingest
        queueLength: "1"
        awsRegion: us-east-1
        scaleOnInFlight: "true"
